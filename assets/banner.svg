      <stop offset="0%" stop-color="#1a1016"/>
      <stop offset="50%" stop-color="#22141c"/>
      <stop offset="100%" stop-color="#2a1620"/>
    </linearGradient>
    <radialGradient id="softPink" cx="78%" cy="42%" r="38%">
