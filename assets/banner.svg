<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120c14"/>
      <stop offset="45%" stop-color="#1a1020"/>
      <stop offset="100%" stop-color="#241018"/>
    </linearGradient>
    <radialGradient id="glowL" cx="18%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#ff8ec8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff8ec8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb3d9"/>
      <stop offset="100%" stop-color="#ff6aa8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glowL)"/>
  <rect width="1200" height="320" fill="url(#glowR)"/>

  <!-- soft floating petals -->
  <g opacity="0.55">
    <ellipse cx="980" cy="70" rx="22" ry="12" fill="url(#petal)" transform="rotate(-20 980 70)"/>
    <ellipse cx="1040" cy="110" rx="18" ry="10" fill="#ff9ecf" transform="rotate(25 1040 110)"/>
    <ellipse cx="1090" cy="60" rx="14" ry="8" fill="#ffc1e0" transform="rotate(-35 1090 60)"/>
    <ellipse cx="1010" cy="180" rx="16" ry="9" fill="#ff8ec8" transform="rotate(10 1010 180)"/>
    <ellipse cx="1120" cy="150" rx="20" ry="11" fill="#ffb6d9" transform="rotate(-15 1120 150)"/>
  </g>

  <!-- stylized cherry blossom (right side), matches avatar vibe -->
  <g transform="translate(980,160)">
    <!-- petals -->
    <g fill="#ff8ec8" opacity="0.95">
      <ellipse cx="0" cy="-34" rx="18" ry="28"/>
      <ellipse cx="32" cy="-12" rx="18" ry="28" transform="rotate(72 32 -12)"/>
      <ellipse cx="20" cy="28" rx="18" ry="28" transform="rotate(144 20 28)"/>
      <ellipse cx="-20" cy="28" rx="18" ry="28" transform="rotate(-144 -20 28)"/>
      <ellipse cx="-32" cy="-12" rx="18" ry="28" transform="rotate(-72 -32 -12)"/>
    </g>
    <!-- center -->
    <circle cx="0" cy="0" r="12" fill="#ffe6f2"/>
    <circle cx="0" cy="0" r="6" fill="#ff4f98"/>
    <!-- tiny stamens -->
    <g stroke="#ffd0e8" stroke-width="1.5">
      <line x1="0" y1="0" x2="0" y2="-18"/>
      <line x1="0" y1="0" x2="16" y2="-8"/>
      <line x1="0" y1="0" x2="12" y2="12"/>
      <line x1="0" y1="0" x2="-12" y2="12"/>
      <line x1="0" y1="0" x2="-16" y2="-8"/>
    </g>
  </g>

  <!-- text -->
  <text x="64" y="125" fill="#fff7fb" font-family="Segoe UI, DejaVu Sans, Arial" font-size="58" font-weight="700">Spring</text>
  <text x="64" y="175" fill="#ffb7d5" font-family="Segoe UI, DejaVu Sans, Arial" font-size="26">Full-stack Developer</text>
  <text x="64" y="220" fill="#c4b5c8" font-family="Segoe UI, DejaVu Sans, Arial" font-size="20">backend · APIs · infrastructure</text>
</svg>
